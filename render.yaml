databases:
  - name: postlytics-db
    databaseName: postlytics
    user: postlytics
    plan: free

services:
  - type: web
    name: postlytics-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: postlytics-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "1"
      - key: ALLOWED_ORIGINS
        sync: false # Set this to your frontend URL for CORS
